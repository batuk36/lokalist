workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - ios
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          unset CERTIFICATE_PRIVATE_KEY
          echo "$CERT_KEY_B64" | base64 --decode > /tmp/cert_key.pem
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)
          app-store-connect fetch-signing-files com.lokatist.app \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up Xcode code signing
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build Flutter iOS (no codesign)
        script: flutter build ios --release --no-codesign
      - name: Archive and export IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/Runner.xcworkspace" \
            --scheme "Runner"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
