workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 120
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - ios
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Fetch signing files
        script: |
          openssl genrsa -traditional 2048 > /tmp/cert_key.pem 2>/dev/null
          app-store-connect fetch-signing-files com.lokatist.app \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/cert_key.pem
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up Xcode code signing
        script: xcode-project use-profiles
      - name: Build Flutter iOS
        script: flutter build ios --release --no-codesign
      - name: Archive and export IPA
        script: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            DEVELOPMENT_TEAM=U7RU7FT9JV \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution"
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
